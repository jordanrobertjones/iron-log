<style>

<body>
<div id="root"></div>

<!-- React via CDN (no build step) -->

<!-- Firebase -->

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
// ╔═══════════════════════════════════════════════════════════════════╗
// ║  REPLACE THESE WITH YOUR FIREBASE CONFIG (see SETUP.md)         ║
// ╚═══════════════════════════════════════════════════════════════════╝
const firebaseConfig = {
  apiKey: "AIzaSyD6fCguQf1PfW6n0hXwffslYoKqW7etLH0",
  authDomain: "iron-log-b7f71.firebaseapp.com",
  projectId: "iron-log-b7f71",
  storageBucket: "iron-log-b7f71.firebasestorage.app",
  messagingSenderId: "327011491449",
  appId: "1:327011491449:web:e3a157846fd2c855a73ea8"
};

firebase.initializeApp(firebaseConfig);
const fbAuth = firebase.auth();
const fbDb = firebase.firestore();
fbDb.enablePersistence().catch(() => {});

// Firebase storage adapter that mimics window.storage API
window.firebaseStorage = {
  async get(key) {
    const user = fbAuth.currentUser;
    if (!user) return null;
    const snap = await fbDb.collection('users').doc(user.uid).collection('data').doc(key).get();
    return snap.exists ? { value: snap.data().value } : null;
  },
  async set(key, value) {
    const user = fbAuth.currentUser;
    if (!user) return null;
    await fbDb.collection('users').doc(user.uid).collection('data').doc(key).set({
      value, updated: firebase.firestore.FieldValue.serverTimestamp()
    });
    return { key, value };
  }
};
</script>

<script type="text/babel" data-type="module">
// The app component is identical to the Claude artifact version
// but uses window.firebaseStorage instead of window.storage

const { useState, useEffect, useCallback, useRef } = React;

// ═══ AUTH WRAPPER ═══
function AuthWrapper() {
  const [user, setUser] = useState(undefined); // undefined = loading

  useEffect(() => {
    const unsub = fbAuth.onAuthStateChanged(u => setUser(u));
    return unsub;
  }, []);

  if (user === undefined) {
    return React.createElement('div', {
      style: { display:'flex',alignItems:'center',justifyContent:'center',minHeight:'100vh',flexDirection:'column',gap:12 }
    },
      React.createElement('div', { style: { fontSize:11,fontWeight:700,letterSpacing:3,textTransform:'uppercase',color:'#555' } }, 'Iron Log'),
      React.createElement('div', { style: { color:'#444',fontSize:14 } }, 'Loading...')
    );
  }

  if (!user) {
    return React.createElement('div', {
      style: { display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',minHeight:'100vh',gap:20,padding:40 }
    },
      React.createElement('div', { style: { fontSize:13,fontWeight:700,letterSpacing:4,textTransform:'uppercase',color:'#555' } }, 'Iron Log'),
      React.createElement('div', { style: { fontSize:28,fontWeight:700 } }, 'Your Gym Companion'),
      React.createElement('div', { style: { fontSize:14,color:'#666',textAlign:'center',lineHeight:1.6,maxWidth:300 } },
        'Track lifts, log runs, get coaching. Syncs across all your devices.'
      ),
      React.createElement('button', {
        onClick: () => {
          const provider = new firebase.auth.GoogleAuthProvider();
          fbAuth.signInWithPopup(provider).catch(e => alert('Sign in failed. Allow popups.'));
        },
        style: { padding:'14px 32px',background:'#4285F4',border:'none',borderRadius:12,color:'#fff',fontSize:15,fontWeight:700,fontFamily:'inherit',cursor:'pointer' }
      }, 'Sign in with Google')
    );
  }

  // Pass user info and use firebase storage
  return React.createElement(App, { user });
}

// ═══ All the app code from the artifact goes here ═══
// (Abbreviated comment -- the full App component from workout-tracker.jsx
//  should be pasted here, with window.storage references replaced by
//  window.firebaseStorage)
//
// For the actual deployment, copy the entire export default function App()
// from the latest workout-tracker.jsx artifact and:
// 1. Remove the "export default" 
// 2. Replace all window.storage with window.firebaseStorage
// 3. Add a sign-out button in the header
// 4. Add { user } as a prop

function App({ user }) {
  // This is a deployment scaffold. 
  // The full app code from workout-tracker.jsx goes here.
  // For now, showing a confirmation screen.

  return React.createElement('div', {
    style: { fontFamily:'system-ui,sans-serif',background:'#0C0C0C',color:'#F0EDE8',minHeight:'100vh',maxWidth:480,margin:'0 auto',padding:'20px' }
  },
    React.createElement('div', { style: { display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20 } },
      React.createElement('div', null,
        React.createElement('div', { style: { fontSize:11,fontWeight:700,letterSpacing:3,textTransform:'uppercase',color:'#555' } }, 'Iron Log'),
        React.createElement('div', { style: { fontSize:19,fontWeight:700,marginTop:4 } }, `Hey ${user.displayName ? user.displayName.split(' ')[0] : 'Athlete'}`)
      ),
      React.createElement('button', {
        onClick: () => fbAuth.signOut(),
        style: { padding:'6px 12px',background:'transparent',border:'1px solid #333',borderRadius:8,color:'#666',fontSize:11,fontFamily:'inherit',cursor:'pointer' }
      }, 'Sign out')
    ),
    React.createElement('div', { style: { padding:'20px',background:'#141414',borderRadius:12,textAlign:'center' } },
      React.createElement('div', { style: { fontSize:15,fontWeight:600,marginBottom:8,color:'#45B764' } }, 'Firebase Connected!'),
      React.createElement('div', { style: { fontSize:13,color:'#888',lineHeight:1.6 } },
        'Auth and Firestore are working. Your data will sync across devices. ',
        'To complete deployment, paste the full App component from the workout-tracker.jsx artifact into this file.'

    )
  );
}

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(AuthWrapper));
</script>
</body>
